<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hamster Vision</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="has-background theme-day">
    <div class="theme-toggle">
      <input type="radio" name="theme" id="day" value="day" checked />
      <label for="day">☀️</label>

      <input type="radio" name="theme" id="night" value="night" />
      <label for="night">🌙</label>

      <input type="radio" name="theme" id="pink" value="pink" />
      <label for="pink">🌸</label>

      <script>
        (function () {
          const BG_POS = { day: "20%", night: "50%", pink: "80%" };
          const savedTheme = localStorage.getItem("theme") || "day";
          document.body.classList.add(`theme-${savedTheme}`);
          document.body.classList.add("has-background");
          document.body.style.setProperty(
            "--bg-x",
            BG_POS[savedTheme] || "50%",
          );
          const savedRadio = document.getElementById(savedTheme);
          if (savedRadio) savedRadio.checked = true;
        })();
      </script>

      <div class="slider"></div>
    </div>

    <main id="camera-page">
      <div id="status"></div>
      <!-- Video feed -->
      <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="expression-canvas"></canvas>
        <div id="camera-overlay"></div>
      </div>

      <!-- Controls -->
      <div id="camera-controls">
        <button id="webcamButton" disabled>
          <span class="btn-text">Start Camera</span>
        </button>
        <div id="emotion-name"></div>
        <div id="image-placeholder">Waiting for face...</div>
      </div>
    </main>

    <script src="/src/landing.js" defer></script>
    <script type="module" src="/src/camera.ts"></script>
  </body>
</html>
