<!doctype html>
<html lang="en">
  <head>
    <!-- Google tag (gtag.js) -->

      src="https://www.googletagmanager.com/gtag/js?id=G-YZ2K0XE3LZ"
    ></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag() {
        dataLayer.push(arguments);
      }
      gtag("js", new Date());

      gtag("config", "G-YZ2K0XE3LZ");

    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hamster Vision</title>
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="has-background theme-day">
    <!-- Expression sound menu -->
    <div
      id="sound-menu"
      style="
        position: fixed;
        bottom: 20px;
        left: 20px;
        background: rgb(0, 0, 0);
        color: white;
        padding: 15px;
        border-radius: 10px;
        z-index: 100;
      "
    >
      <div style="margin-bottom: 10px">
        <label>Volume: </label>
        <input
          type="range"
          id="volume-control"
          min="0"
          max="1"
          step="0.1"
          value="0.5"
        />
      </div>
      <button id="mute-btn" style="width: 100%; cursor: pointer">
        🔊 Mute
      </button>
    </div>

    <div class="theme-toggle">
      <input type="radio" name="theme" id="day" value="day" checked />
      <label for="day">☀️</label>
      <input type="radio" name="theme" id="night" value="night" />
      <label for="night">🌙</label>
      <input type="radio" name="theme" id="pink" value="pink" />
      <label for="pink">🌸</label>
      <div class="slider"></div>
    </div>

    <main id="camera-page">
      <div id="status"></div>
      <div id="video-container">
        <video id="webcam" autoplay playsinline></video>
        <canvas id="expression-canvas"></canvas>
        <div id="camera-overlay"></div>
      </div>
      <div id="camera-controls">
        <button id="webcamButton" disabled>
          <span class="btn-text">Start Camera</span>
        </button>
        <div id="emotion-name"></div>
        <div id="image-placeholder">Waiting for face...</div>
      </div>
    </main>

    <script src="/src/theme.js"></script>
    <script src="/src/landing.js" defer></script>
    <script type="module" src="/src/camera.ts"></script>
  </body>
</html>
