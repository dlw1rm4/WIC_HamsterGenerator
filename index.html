<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="/src/style.css" />
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico" />
    <title>Hamster Vision</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&family=Poppins:wght@400;600;700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Pixelify+Sans&display=swap"
      rel="stylesheet"
    />
    <style>
      .hidden {
        display: none !important;
      }
    </style>
  </head>
  <body class="has-background theme-day">
    <div class="theme-toggle">
    <input type="radio" name="theme" id="sun" checked>
    <label for="sun">☀️</label>

    <input type="radio" name="theme" id="flower">
    <label for="flower">🌸</label>

    <input type="radio" name="theme" id="moon">
    <label for="moon">🌙</label>

    <div class="toggle-bg"></div>
  </div>

    <div id="landing-content">
      <div id="dynamic-text"></div>
      <button type="button" id="info">Info</button>
      <a href="/camera.html">
        <button type="button" id="getstarted">Get started!</button>
      </a>
    </div>

<div class="theme-toggle">
  <input type="radio" name="theme" id="day" value="day">
  <label for="day">Day</label>

  <input type="radio" name="theme" id="night" value="night">
  <label for="night">Night</label>

  <input type="radio" name="theme" id="pink" value="pink">
  <label for="pink">Pink</label>
</div>

    <div id="info-card" class="hidden">
      <div class="card-content">
        <h2>How to Use This Website:</h2>
        <ol>
          <li>Click get started.</li>
          <li>Give access to your camera.</li>
          <li>Put your face inside the frame.</li>
          <li>Try different facial expressions.</li>
          <li>Have fun!</li>
        </ol>
        <button id="close-btn">Close</button>
      </div>
    </div>

    <script src="/src/landing.js" defer></script>
    <script type="module" src="/src/camera.ts"></script>
    <script>
      const infoBtn = document.getElementById("info");
      const closeBtn = document.getElementById("close-btn");
      const infoCard = document.getElementById("info-card");

      infoBtn.addEventListener("click", () =>
        infoCard.classList.remove("hidden"),
      );
      closeBtn.addEventListener("click", () =>
        infoCard.classList.add("hidden"),
      );
      infoCard.addEventListener("click", (e) => {
        if (e.target === infoCard) infoCard.classList.add("hidden");
      });
    </script>
  </body>
</html>
