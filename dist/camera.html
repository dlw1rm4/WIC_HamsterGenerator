<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hamster Vision</title>
    <link rel="icon" type="image/x-icon" href="/images/favicon.ico">
    <script type="module" crossorigin src="/assets/camera-Dn-xZWtv.js"></script>
    <link rel="stylesheet" crossorigin href="/assets/camera-tn0RQdqM.css">
</head>
<body>
    <!-- Loading overlay -->
    <div id="loading-overlay">
        <p>Loading model...</p>
    </div>

    <!-- Status message -->
    <div id="status">Initializing...</div>

    <!-- Webcam button -->
    <button id="webcamButton" disabled>
        <span class="btn-text">Start Camera</span>
    </button>

    <!-- Video feed -->
    <video id="webcam" autoplay playsinline></video>

    <!-- Canvas overlay for landmarks -->
    <canvas id="output_canvas"></canvas>

    <!-- Emotion display -->
    <div id="emotion-name">—</div>

    <!-- Confidence bar -->
    <div id="confidence-bar"></div>
    <div id="confidence-val">0%</div>

    <!-- Expression image -->
    <div id="image-placeholder">Waiting for face...</div>
    <img id="expression-img" class="hidden" alt="Expression" />
    <div id="expression-caption"></div>

</body>
</html>
